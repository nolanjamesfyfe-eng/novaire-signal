name: Generate Signal Site (Bangkok 7AM)

on:
  schedule:
    # 00:00 UTC = 07:00 Asia/Bangkok
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-site:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 yfinance

      - name: Generate Novaire Signal + Portfolio
        run: python3 generate.py

      - name: Commit and push generated pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only stage files that actually exist to avoid pathspec failures.
          for f in index.html portfolio/index.html stats.json feed.json; do
            [ -f "$f" ] && git add "$f"
          done

          if git diff --staged --quiet; then
            echo "No generated changes to commit"
          else
            git commit -m "chore: 7am Bangkok refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

name: Generate Signal Site (Bangkok 7AM)

on:
  schedule:
    # 00:00 UTC = 07:00 Asia/Bangkok
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: signal-site-refresh
  cancel-in-progress: false

jobs:
  build-site:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 yfinance

      - name: Sync latest main before generating
        run: |
          set -euo pipefail
          git fetch origin main
          git rebase origin/main

      - name: Generate Novaire Signal + Portfolio
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
        run: python3 generate.py

      - name: Commit and push generated pages
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage generated outputs (stats.json is gitignored, so force-add when present).
          [ -f index.html ] && git add index.html
          [ -f portfolio/index.html ] && git add portfolio/index.html
          [ -f portfolio/evolutionfund/index.html ] && git add portfolio/evolutionfund/index.html
          [ -f feed.json ] && git add feed.json
          [ -f stats.json ] && git add -f stats.json

          if git diff --staged --quiet; then
            echo "No generated changes to commit"
            exit 0
          fi

          git commit -m "chore: 7am Bangkok refresh $(date -u '+%Y-%m-%d %H:%M UTC')"

          # One retry covers a remote update that lands between commit and push.
          git push || { git fetch origin main && git rebase origin/main && git push; }

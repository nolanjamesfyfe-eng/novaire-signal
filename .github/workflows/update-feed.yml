name: Update Signal Feed

on:
  schedule:
    # Run every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

concurrency:
  group: signal-feed-refresh
  cancel-in-progress: false

jobs:
  fetch-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Sync latest main before fetching feed
        run: |
          set -euo pipefail
          git fetch origin main
          git rebase origin/main

      - name: Fetch tweets
        run: python3 scripts/fetch_feed.py

      - name: Commit and push feed.json
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add feed.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          else
            git commit -m "chore: Update signal feed $(date -u '+%Y-%m-%d %H:%M UTC')"
          fi

          git push || { git fetch origin main && git rebase origin/main && git push; }
